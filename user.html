<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crew Cue Station</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #000000 !important; /* Forces total blackout backstage */
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            transition: background-color 0.05s ease;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
        }
        
        /* Top Left Position Name Styling */
        #position-tag {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 30px 0 0 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* Full screen bright solid red flash rule */
        body.standby-flash {
            background-color: #ff0000 !important;
        }
    </style>
</head>
<body>

    <div id="position-tag">LOADING...</div>

    <script>
        // Your live database connection strings
        const SUPABASE_URL = "https://lehixazrwwjldgpxylig.supabase.co";
        const SUPABASE_KEY = "sb_publishable_ztUNSuNBHDLkdmI7MQlxxA_QEfkXMVF"; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Reads the tag from the URL (e.g., /user.html#LX extracts "LX")
        const hash = window.location.hash.replace('#', '').trim();

        async function initStation() {
            const title = document.getElementById('position-tag');
            if (!hash) {
                title.innerText = "NO POS SET";
                title.style.color = "#ff2a2a";
                return;
            }
            
            // Set top-left label text
            title.innerText = hash;

            // 1. Check current database state immediately on page load
            let { data, error } = await supabaseClient.from('cues').select('state').eq('station', hash).single();
            if (data) {
                updateLightUI(data.state);
            }

            // 2. Open up a real-time listening stream for changes to this station row
            supabaseClient.channel(`live-${hash}`)
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'cues', filter: `station=eq.${hash}` }, 
                payload => { 
                    if (payload.new) {
                        updateLightUI(payload.new.state);
                    } 
                }
            ).subscribe();
        }

        // Handles the cue-light visual states based on the Stage Manager buttons
        function updateLightUI(state) {
            if (state === 'standby') {
                document.body.classList.add('standby-flash'); // Screen turns bright solid RED
            } else {
                document.body.classList.remove('standby-flash'); // Both 'go' and 'off' clear back to BLACK
            }
        }

        window.onload = initStation;
        
        // Reloads the interface if a technician types a different channel hash into the URL bar
        window.addEventListener('hashchange', () => window.location.reload());
    </script>
</body>
</html>
