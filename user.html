<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crew Cue Station</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #000000 !important;
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            transition: background-color 0.05s ease;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
        }
        #position-tag {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 30px 0 0 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
        }
        
        /* Standby state flash indicator */
        body.standby-flash {
            background-color: #ff0000 !important;
        }

        /* High-priority attention call loop animation */
        @keyframes emergencyCallFlash {
            0%, 100% { background-color: #000000; }
            50% { background-color: #ff9900; }
        }
        body.attention-call-active {
            animation: emergencyCallFlash 0.5s infinite !important;
        }
    </style>
</head>
<body>

    <div id="position-tag">LOADING...</div>

    <script>
        const SUPABASE_URL = "https://lehixazrwwjldgpxylig.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxlaGl4YXpyd3dqbGRncHh5bGlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyODc4NDAsImV4cCI6MjA5Njg2Mzg0MH0.y66qZeA-z3lULQHGTCI7_aY3BEA9Qj6i56xhyX0uH8I"; 
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
            auth: { persistSession: false }
        });

        const hash = window.location.hash.replace('#', '').trim().toUpperCase();

        // Local state track memory to preserve values between individual column payloads
        let currentCueState = "OFF";
        let currentCallStatus = false;

        async function fetchInitialStatus() {
            if (!hash) return;
            try {
                let { data } = await supabaseClient
                    .from('cues')
                    .select('state, is_calling')
                    .eq('station', hash)
                    .maybeSingle();

                if (data) {
                    currentCueState = String(data.state).toUpperCase();
                    currentCallStatus = Boolean(data.is_calling);
                    applyUIRender();
                }
            } catch (err) {
                console.error("Initial fetch failed:", err);
            }
        }

        async function initStation() {
            const title = document.getElementById('position-tag');
            if (!hash) {
                title.innerText = "NO POS SET";
                return;
            }
            title.innerText = hash;

            await fetchInitialStatus();

            // Realtime data pipeline subscription
            supabaseClient.channel('crew-global-sync')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'cues' }, 
                payload => { 
                    if (payload.new && payload.new.station.toUpperCase() === hash) {
                        // Ensure we parse whatever columns Supabase sends us without losing data
                        if (payload.new.state !== undefined) {
                            currentCueState = String(payload.new.state).toUpperCase();
                        }
                        if (payload.new.is_calling !== undefined) {
                            currentCallStatus = Boolean(payload.new.is_calling);
                        }
                        applyUIRender();
                    } 
                }
            ).subscribe();
        }

        function applyUIRender() {
            // Priority 1: Orange Master Call Intercept
            if (currentCallStatus === true) {
                document.body.classList.remove('standby-flash');
                document.body.classList.add('attention-call-active');
                return;
            }
            
            // Priority 2: Clear Out Call, Process Standby Layouts
            document.body.classList.remove('attention-call-active');

            if (currentCueState === 'STANDBY') {
                document.body.classList.add('standby-flash');
            } else {
                document.body.classList.remove('standby-flash');
            }
        }

        window.onload = initStation;
        window.addEventListener('hashchange', () => window.location.reload());
    </script>
</body>
</html>
