<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crew Cue Station</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #000000 !important;
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            transition: background-color 0.05s ease, opacity 0.1s ease;
            user-select: none;
            overflow: hidden;
            position: relative;
        }
        
        #position-tag {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 30px 0 0 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 10;
        }
        
        body.standby-flash { 
            background-color: #ff0000 !important; 
        }

        /* --- CALL ACTIVE STATE: DROPS BASE PAGE TO 50% OPACITY --- */
        body.attention-call-active {
            opacity: 0.85;
        }

        /* --- 20% HEIGHT ORANGE/YELLOW COLOR CYCLE ALERT BAR --- */
        #call-overlay-bar {
            display: none; /* Hidden unless called */
            position: absolute;
            top: 40%; /* Positioned across the middle band */
            left: 0;
            width: 100vw;
            height: 20vh; /* Exactly 20% window height */
            z-index: 9999; /* Forces banner to sit completely 100% visible on top */
            opacity: 1 !important; /* Overrides the body's 50% opacity filter */
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        }

        /* Continuous Color Sequence: Orange -> Off -> Yellow -> Off -> Orange */
        @keyframes callColorPattern {
            0%, 20%, 100% { background-color: #ff9900; }  /* Orange */
            35% { background-color: transparent; }        /* Off */
            55%, 75% { background-color: #ffcc00; }       /* Yellow */
            90% { background-color: transparent; }        /* Off */
        }

        body.attention-call-active #call-overlay-bar {
            display: flex;
            animation: callColorPattern 1.4s infinite;
        }

        #call-overlay-text {
            color: #ffffff; /* Solid White Text Specification */
            font-size: calc(2.2vw + 1.2rem);
            font-weight: 1000;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="position-tag">LOADING...</div>

    <div id="call-overlay-bar">
        <div id="call-overlay-text">STAGE MANAGEMENT IS CALLING</div>
    </div>

    <script>
        const SUPABASE_URL = "https://lehixazrwwjldgpxylig.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxlaGl4YXpyd3dqbGRncHh5bGlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyODc4NDAsImV4cCI6MjA5Njg2Mzg0MH0.y66qZeA-z3lULQHGTCI7_aY3BEA9Qj6i56xhyX0uH8I"; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const hash = window.location.hash.replace('#', '').trim().toUpperCase();

        // High-frequency Background Sync Mechanism (Backup Loop)
        async function syncDataFromDatabase() {
            if (!hash) return;
            try {
                let { data } = await supabaseClient
                    .from('cues')
                    .select('state, is_calling')
                    .eq('station', hash)
                    .maybeSingle();
                
                if (data) {
                    updateLightUI(String(data.state).toUpperCase(), data.is_calling);
                }
            } catch (err) {
                console.error("Database polling error:", err);
            }
        }

        async function initStation() {
            const title = document.getElementById('position-tag');
            if (!hash) {
                title.innerText = "NO POS SET";
                return;
            }
            title.innerText = hash;

            // Initial immediate check on page load
            await syncDataFromDatabase();

            // Realtime Stream WebSocket Listener
            supabaseClient.channel('crew-global-sync')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'cues' }, 
                payload => { 
                    if (payload.new && payload.new.station.toUpperCase() === hash) {
                        updateLightUI(String(payload.new.state).toUpperCase(), payload.new.is_calling);
                    } 
                }
            ).subscribe();

            // Safety Engine Fallback Loop - updates page manually every 1000ms
            setInterval(syncDataFromDatabase, 10);
        }

        function updateLightUI(cueState, isCalling) {
            // Priority 1: Check Master Call Registry
            if (isCalling === true || isCalling === 'true') {
                document.body.classList.add('attention-call-active');
                return;
            }
            
            // Drop call state if false
            document.body.classList.remove('attention-call-active');

            // Priority 2: Standard Standby Light State Routing
            if (cueState === 'STANDBY') {
                document.body.classList.add('standby-flash');
            } else {
                document.body.classList.remove('standby-flash');
            }
        }

        window.onload = initStation;
        window.addEventListener('hashchange', () => window.location.reload());
    </script>
</body>
</html>
