<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crew Cue Station</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #000000 !important;
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            transition: background-color 0.05s ease;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
        }
        #position-tag {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 30px 0 0 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
        }
        body.standby-flash {
            background-color: #ff0000 !important;
        }
    </style>
</head>
<body>

    <div id="position-tag">LOADING...</div>

    <script>
        const SUPABASE_URL = "https://lehixazrwwjldgpxylig.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxlaGl4YXpyd3dqbGRncHh5bGlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyODc4NDAsImV4cCI6MjA5Njg2Mzg0MH0.y66qZeA-z3lULQHGTCI7_aY3BEA9Qj6i56xhyX0uH8I"; 
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
            auth: { persistSession: false }
        });

        const hash = window.location.hash.replace('#', '').trim();

        // Standard, clean query loop that forces real-time fetches
        async function checkStationStatus() {
            if (!hash) return;
            try {
                // Alternating the sort direction on every single tick completely shatters the browser cache
                const toggleSort = new Date().getTime() % 2 === 0;
                
                let { data, error } = await supabaseClient
                    .from('cues')
                    .select('state')
                    .eq('station', hash)
                    .order('id', { ascending: toggleSort }) 
                    .maybeSingle();

                if (data) {
                    updateLightUI(String(data.state).toUpperCase());
                }
            } catch (err) {
                console.error("Status check failed:", err);
            }
        }

        async function initStation() {
            const title = document.getElementById('position-tag');
            if (!hash) {
                title.innerText = "NO POS SET";
                return;
            }
            title.innerText = hash;

            // Run first check immediately on boot
            await checkStationStatus();

            // REALTIME STREAM: Changes colors immediately upon table updates
            supabaseClient.channel(`live-${hash}`)
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'cues', filter: `station=eq.${hash}` }, 
                payload => { 
                    if (payload.new) {
                        updateLightUI(String(payload.new.state).toUpperCase());
                    } 
                }
            ).subscribe();

            // BACKUP POLL: Standard, error-free refresh loops 3 times every second
            setInterval(checkStationStatus, 350);
        }

        function updateLightUI(state) {
            if (state === 'STANDBY') {
                document.body.classList.add('standby-flash');
            } else {
                document.body.classList.remove('standby-flash');
            }
        }

        window.onload = initStation;
        window.addEventListener('hashchange', () => window.location.reload());
    </script>
</body>
</html>
