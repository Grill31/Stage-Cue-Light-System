<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crew Cue Station</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #000000 !important;
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            transition: background-color 0.05s ease;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
        }
        #position-tag {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 30px 0 0 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
        }
        body.standby-flash {
            background-color: #ff0000 !important;
        }
    </style>
</head>
<body>

    <div id="position-tag">LOADING...</div>

    <script>
        const SUPABASE_URL = "https://lehixazrwwjldgpxylig.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxlaGl4YXpyd3dqbGRncHh5bGlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyODc4NDAsImV4cCI6MjA5Njg2Mzg0MH0.y66qZeA-z3lULQHGTCI7_aY3BEA9Qj6i56xhyX0uH8I"; 
        
        // Disable internal client caching completely
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
            auth: { persistSession: false }
        });

        const hash = window.location.hash.replace('#', '').trim();

        // Native cache-busting fetch engine
        async function forceFreshStatusCheck() {
            if (!hash) return;
            try {
                // We add a random cache buster parameter to bypass CDN/browser memory entirely
                const cacheBuster = new Date().getTime();
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/cues?station=eq.${hash}&select=state&_cb=${cacheBuster}`, 
                    {
                        method: "GET",
                        headers: {
                            "apikey": SUPABASE_KEY,
                            "Authorization": `Bearer ${SUPABASE_KEY}`,
                            "Cache-Control": "no-cache, no-store, must-revalidate",
                            "Pragma": "no-cache"
                        }
                    }
                );
                
                const data = await response.json();
                if (data && data.length > 0) {
                    updateLightUI(String(data[0].state).toUpperCase());
                }
            } catch (err) {
                console.error("Fresh fetch failed", err);
            }
        }

        async function initStation() {
            const title = document.getElementById('position-tag');
            if (!hash) {
                title.innerText = "NO POS SET";
                return;
            }
            title.innerText = hash;

            // Run first check immediately
            await forceFreshStatusCheck();

            // Try to establish the real-time channel stream
            supabaseClient.channel(`live-${hash}`)
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'cues', filter: `station=eq.${hash}` }, 
                payload => { 
                    if (payload.new) {
                        updateLightUI(String(payload.new.state).toUpperCase());
                    } 
                }
            ).subscribe();

            // HARD CRASH BACKUP: Safely requests an entirely un-cached state every 300ms
            setInterval(forceFreshStatusCheck, 300);
        }

        function updateLightUI(state) {
            if (state === 'STANDBY') {
                document.body.classList.add('standby-flash');
            } else {
                document.body.classList.remove('standby-flash');
            }
        }

        window.onload = initStation;
        window.addEventListener('hashchange', () => window.location.reload());
    </script>
</body>
</html>
