<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crew Cue Station</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --standby-color: #ff9800;
            --go-color: #4caf50;
            --off-color: #222;
        }
        body {
            font-family: system-ui, sans-serif;
            background-color: var(--bg-color);
            color: #fff;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            user-select: none;
        }

        #station-title {
            font-size: 3.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 30px;
            font-weight: 700;
            color: #444;
        }

        /* Large display light ring */
        .stage-bulb {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background-color: var(--off-color);
            transition: all 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.9);
            border: 4px solid #111;
        }

        .stage-bulb.standby {
            background-color: var(--standby-color);
            box-shadow: 0 0 100px var(--standby-color), inset 0 0 10px rgba(255,255,255,0.4);
        }

        .stage-bulb.go {
            background-color: var(--go-color);
            box-shadow: 0 0 100px var(--go-color), inset 0 0 10px rgba(255,255,255,0.4);
        }

        #status-banner {
            font-size: 3rem;
            font-weight: 900;
            margin-top: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #333;
        }
    </style>
</head>
<body>

    <h1 id="station-title">CUE LINK</h1>
    <div id="light" class="stage-bulb"></div>
    <div id="status-banner">STANDBY OFF</div>

    <script>
        const SUPABASE_URL = "https://lehixazrwwjldgpxylig.supabase.co";
        const SUPABASE_KEY = "sb_publishable_ztUNSuNBHDLkdmI7MQlxxA_QEfkXMVF"; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const hash = window.location.hash.replace('#', '').trim();

        async function initStation() {
            const title = document.getElementById('station-title');
            if (!hash) {
                title.innerText = "NO POSITION SET";
                title.style.color = "#ff2a2a";
                return;
            }

            title.innerText = hash;

            // Fetch configuration on page draw
            let { data } = await supabaseClient.from('cues').select('state').eq('station', hash).single();
            if (data) updateLightUI(data.state);

            // Connect live real-time network stream targeting this hash signature
            supabaseClient.channel(`live-${hash}`)
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'cues', filter: `station=eq.${hash}` }, 
                payload => {
                    if (payload.new) updateLightUI(payload.new.state);
                }
            ).subscribe();
        }

        function updateLightUI(state) {
            const light = document.getElementById('light');
            const banner = document.getElementById('status-banner');
            const title = document.getElementById('station-title');

            light.className = "stage-bulb";
            
            if (state === 'standby') {
                light.classList.add('standby');
                banner.innerText = "STANDBY";
                banner.style.color = "var(--standby-color)";
                title.style.color = "var(--standby-color)";
            } else if (state === 'go') {
                light.classList.add('go');
                light.style.transform = "scale(1.05)";
                banner.innerText = "GO";
                banner.style.color = "var(--go-color)";
                title.style.color = "var(--go-color)";
                setTimeout(() => light.style.transform = "scale(1)", 100);
            } else {
                banner.innerText = "OFF";
                banner.style.color = "#333";
                title.style.color = "#444";
            }
        }

        window.onload = initStation;
        window.addEventListener('hashchange', () => window.location.reload());
    </script>
</body>
</html>
