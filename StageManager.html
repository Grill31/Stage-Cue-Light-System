<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SM Master Console</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #121212;
            --box-bg: #1a1a1a;
            --red-on: #ff2a2a;
            --red-off: #4d0a0a;
            --green-on: #2acc2a;
            --green-off: #0a4d0a;
            --panel-border: #3a3a3a;
            --orange-call: #ff9900;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            color: #fff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        /* --- UPPER RACK (15% Viewport Height) --- */
        .top-utility-bar {
            height: 15vh;
            min-height: 80px;
            display: grid;
            grid-template-columns: 1.2fr 1.6fr 1.2fr;
            align-items: center;
            background-color: #181818;
            border-bottom: 5px ridge var(--panel-border);
            padding: 0 20px;
            box-sizing: border-box;
        }

        .time-module {
            font-family: monospace;
            font-weight: bold;
            font-size: calc(1.4vh + 1.1rem);
            color: #ffffff;
            display: flex;
            align-items: center;
        }

        .stopwatch-container {
            justify-content: flex-end;
            gap: 10px;
        }

        .sw-btn {
            background-color: #333;
            color: #fff;
            border: 2px solid #555;
            padding: 6px 12px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .macro-container {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .macro-btn {
            color: #fff;
            border: 3px solid #111;
            border-radius: 6px;
            padding: 10px 20px;
            font-weight: 900;
            font-size: 0.95rem;
            letter-spacing: 1px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            transition: all 0.05s ease;
        }
        .macro-btn:active { transform: scale(0.96); }
        
        .btn-master-go { background: linear-gradient(180deg, #2acc2a 0%, #0a4d0a 100%); }
        .btn-master-reset { background: linear-gradient(180deg, #444 0%, #222 100%); border-color: #555; }

        /* --- CUE LIGHT DECK (85% Viewport Height) --- */
        .console-rack {
            height: 85vh;
            display: grid;
            grid-template-columns: repeat(7, 1fr); 
            gap: 12px;
            padding: 15px;
            background-color: #222;
            box-sizing: border-box;
        }

        .channel-strip {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            background: var(--box-bg);
            padding: 2vh 8px;
            border: 2px solid #2d2d2d;
            border-radius: 6px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            box-sizing: border-box;
            transition: background-color 0.2s ease;
        }

        /* --- CALL SYSTEM --- */
        .call-dash-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px;
            box-sizing: border-box;
        }

        .action-call-btn {
            background-color: var(--orange-call);
            color: #000;
            border: 2px solid #111;
            border-radius: 4px;
            font-weight: 900;
            font-size: 0.75rem;
            padding: 4px 8px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .action-cancel-btn {
            background-color: #000000;
            color: #444;
            border: 2px solid #222;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.7rem;
            padding: 4px 6px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .action-cancel-btn.active-kill {
            color: #fff;
            border-color: #ff3333;
        }

        @keyframes callFlashLoop {
            0%, 100% { background-color: var(--box-bg); }
            50% { background-color: #5d3a00; }
        }
        .channel-strip.flashing-call-active {
            animation: callFlashLoop 0.5s infinite !important;
        }

        /* --- CONTROL BUTTONS --- */
        .cue-btn {
            width: 82%;
            aspect-ratio: 1 / 1; 
            max-width: 140px;
            border: 5px solid #111;
            border-radius: 50%;
            cursor: pointer;
            outline: none;
            box-sizing: border-box;
            position: relative;
        }
        .cue-btn::after {
            content: attr(data-key);
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: #666;
            font-weight: bold;
            font-family: monospace;
        }

        .btn-standby { background: radial-gradient(circle, #5a1010 0%, var(--red-off) 100%); box-shadow: inset 0 0 15px rgba(0,0,0,0.9); }
        .btn-standby.active { background: radial-gradient(circle, #ff8888 0%, var(--red-on) 100%); box-shadow: 0 0 35px var(--red-on), inset 0 0 10px #fff; }

        .btn-go { background: radial-gradient(circle, #105a10 0%, var(--green-off) 100%); box-shadow: inset 0 0 15px rgba(0,0,0,0.9); }
        .btn-go.active { background: radial-gradient(circle, #88ff88 0%, var(--green-on) 100%); box-shadow: 0 0 35px var(--green-on), inset 0 0 10px #fff; }

        .label-window {
            width: 95%;
            background-color: #f8f9fa;
            color: #000;
            font-weight: 900;
            font-size: calc(1.2vw + 1rem); 
            padding: 8px 0;
            text-align: center;
            text-transform: uppercase;
            border: 4px solid #000;
            border-radius: 4px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            letter-spacing: 1px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="top-utility-bar">
        <div class="time-module" id="wall-clock">00:00:00</div>
        
        <div class="macro-container">
            <button class="macro-btn btn-master-go" onclick="triggerTargetedMasterGo()">Master GO (\)</button>
            <button class="macro-btn btn-master-reset" onclick="triggerGlobalReset()">Reset All (1)</button>
        </div>
        
        <div class="time-module stopwatch-container">
            <span id="sw-display">00:00:00:000</span>
            <button class="sw-btn" id="sw-toggle" onclick="toggleStopwatch()">Start</button>
            <button class="sw-btn" onclick="resetStopwatch()">Reset</button>
        </div>
    </div>

    <div class="console-rack" id="master-rack"></div>

    <script>
        const SUPABASE_URL = "https://lehixazrwwjldgpxylig.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxlaGl4YXpyd3dqbGRncHh5bGlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyODc4NDAsImV4cCI6MjA5Njg2Mzg0MH0.y66qZeA-z3lULQHGTCI7_aY3BEA9Qj6i56xhyX0uH8I"; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const stationList = ["LX", "SQ", "SL", "SR", "AUTO", "RAIL", "MD"];
        
        const hotkeyMaps = {
            'q': { station: 'LX', action: 'STANDBY' }, 'w': { station: 'SQ', action: 'STANDBY' },
            'e': { station: 'SL', action: 'STANDBY' }, 'r': { station: 'SR', action: 'STANDBY' },
            't': { station: 'AUTO', action: 'STANDBY' }, 'y': { station: 'RAIL', action: 'STANDBY' }, 'u': { station: 'MD', action: 'STANDBY' },
            'a': { station: 'LX', action: 'GO' }, 's': { station: 'SQ', action: 'GO' },
            'd': { station: 'SL', action: 'GO' }, 'f': { station: 'SR', action: 'GO' },
            'g': { station: 'AUTO', action: 'GO' }, 'h': { station: 'RAIL', action: 'GO' }, 'j': { station: 'MD', action: 'GO' }
        };

        let localStateRegistry = {};
        let activeCallTimers = {};

        // --- WALL CLOCK ---
        function updateWallClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('wall-clock').innerText = `${hours}:${minutes}:${seconds}`;
        }
        setInterval(updateWallClock, 1000);
        updateWallClock();

        // --- STOPWATCH ---
        let swInterval = null;
        let swElapsedTime = 0;

        function toggleStopwatch() {
            const btn = document.getElementById('sw-toggle');
            if (swInterval) {
                clearInterval(swInterval);
                swInterval = null;
                btn.innerText = "Start";
            } else {
                const startTime = Date.now() - swElapsedTime;
                swInterval = setInterval(() => {
                    swElapsedTime = Date.now() - startTime;
                    renderStopwatchUI();
                }, 10);
                btn.innerText = "Stop";
            }
        }

        function resetStopwatch() {
            clearInterval(swInterval);
            swInterval = null;
            swElapsedTime = 0;
            document.getElementById('sw-toggle').innerText = "Start";
            renderStopwatchUI();
        }

        function renderStopwatchUI() {
            let tempTime = swElapsedTime;
            const hours = Math.floor(tempTime / 3600000);
            tempTime %= 3600000;
            const minutes = Math.floor(tempTime / 60000);
            tempTime %= 60000;
            const seconds = Math.floor(tempTime / 1000);
            const milliseconds = tempTime % 1000;
            document.getElementById('sw-display').innerText = 
                `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}:${String(milliseconds).padStart(3, '0')}`;
        }

        // --- DATABASE OPERATIONS ---
        async function syncDataFromDatabase() {
            let { data: currentCues } = await supabaseClient.from('cues').select('*');
            if (currentCues) {
                currentCues.forEach(row => {
                    localStateRegistry[row.station] = String(row.state).toUpperCase();
                    updateButtonUI(row.station, localStateRegistry[row.station]);
                    updateCallUI(row.station, row.is_calling);
                });
            }
        }

        async function buildConsole() {
            const rack = document.getElementById('master-rack');
            rack.innerHTML = '';

            const keyIndicators = {
                'LX': {std: 'Q', go: 'A'}, 'SQ': {std: 'W', go: 'S'}, 'SL': {std: 'E', go: 'D'},
                'SR': {std: 'R', go: 'F'}, 'AUTO': {std: 'T', go: 'G'}, 'RAIL': {std: 'Y', go: 'H'}, 'MD': {std: 'U', go: 'J'}
            };

            stationList.forEach(st => {
                localStateRegistry[st] = 'OFF';
                const strip = document.createElement('div');
                strip.className = 'channel-strip';
                strip.id = `strip-${st}`;
                strip.innerHTML = `
                    <div class="call-dash-header">
                        <button class="action-call-btn" onclick="fireCallSequence('${st}')">Call</button>
                        <button class="action-cancel-btn" id="cnc-${st}" onclick="killCallSequence('${st}')">Cancel</button>
                    </div>
                    <button class="cue-btn btn-standby" id="std-${st}" data-key="${keyIndicators[st].std}" onclick="toggleSignal('${st}', 'STANDBY')"></button>
                    <div class="label-window">${st}</div>
                    <button class="cue-btn btn-go" id="go-${st}" data-key="${keyIndicators[st].go}" onclick="toggleSignal('${st}', 'GO')"></button>
                `;
                rack.appendChild(strip);
            });

            await syncDataFromDatabase();

            supabaseClient.channel('sm-sync')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'cues' }, 
                payload => { 
                    if(payload.new) {
                        localStateRegistry[payload.new.station] = String(payload.new.state).toUpperCase();
                        updateButtonUI(payload.new.station, localStateRegistry[payload.new.station]); 
                        updateCallUI(payload.new.station, payload.new.is_calling);
                    }
                }
            ).subscribe();
        }

        // --- CALL SYSTEM DATABASE TRIGGERS ---
        async function fireCallSequence(station) {
            updateCallUI(station, true);
            
            // Write directly to the DB column
            await supabaseClient.from('cues').update({ is_calling: true }).eq('station', station);

            if (activeCallTimers[station]) clearTimeout(activeCallTimers[station]);
            
            activeCallTimers[station] = setTimeout(() => {
                killCallSequence(station);
            }, 8000);
        }

        async function killCallSequence(station) {
            if (activeCallTimers[station]) {
                clearTimeout(activeCallTimers[station]);
                delete activeCallTimers[station];
            }
            
            updateCallUI(station, false);
            
            // Clear the DB column
            await supabaseClient.from('cues').update({ is_calling: false }).eq('station', station);
        }

        function updateCallUI(station, isCalling) {
            const strip = document.getElementById(`strip-${station}`);
            const cancelBtn = document.getElementById(`cnc-${station}`);
            if (!strip || !cancelBtn) return;

            if (isCalling) {
                strip.classList.add('flashing-call-active');
                cancelBtn.classList.add('active-kill');
            } else {
                strip.classList.remove('flashing-call-active');
                cancelBtn.classList.remove('active-kill');
            }
        }

        // --- CUE SIGNAL CONTROL SWITCHES ---
        async function toggleSignal(station, targetState) {
            const current = localStateRegistry[station] || 'OFF';
            const newState = (current === targetState) ? 'OFF' : targetState;
            
            localStateRegistry[station] = newState;
            updateButtonUI(station, newState);
            
            await supabaseClient.from('cues').update({ state: newState }).eq('station', station);
        }

        async function triggerTargetedMasterGo() {
            const updates = [];
            stationList.forEach(st => {
                if (localStateRegistry[st] === 'STANDBY') {
                    localStateRegistry[st] = 'GO';
                    updateButtonUI(st, 'GO');
                    updates.push(supabaseClient.from('cues').update({ state: 'GO' }).eq('station', st));
                }
            });
            if (updates.length > 0) await Promise.all(updates);
        }

        async function triggerGlobalReset() {
            const updates = [];
            stationList.forEach(st => {
                localStateRegistry[st] = 'OFF';
                updateButtonUI(st, 'OFF');
                updateCallUI(st, false);
                updates.push(supabaseClient.from('cues').update({ state: 'OFF', is_calling: false }).eq('station', st));
            });
            await Promise.all(updates);
        }

        function updateButtonUI(station, state) {
            const stdBtn = document.getElementById(`std-${station}`);
            const goBtn = document.getElementById(`go-${station}`);
            if (!stdBtn || !goBtn) return;

            stdBtn.classList.remove('active');
            goBtn.classList.remove('active');

            if (state === 'STANDBY') stdBtn.classList.add('active');
            if (state === 'GO') goBtn.classList.add('active');
        }

        // --- KEYBOARD CAPTURE INTERCEPT ENGINE ---
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === '\\') { e.preventDefault(); triggerTargetedMasterGo(); return; }
            if (key === '1') { e.preventDefault(); triggerGlobalReset(); return; }

            if (hotkeyMaps[key]) {
                e.preventDefault();
                const target = hotkeyMaps[key];
                toggleSignal(target.station, target.action);
            }
        });

        window.onload = buildConsole;
    </script>
</body>
</html>
