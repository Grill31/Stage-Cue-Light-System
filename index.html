<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SM Master Console</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #121212;
            --box-bg: #1a1a1a;
            --red-on: #ff2a2a;
            --red-off: #4d0a0a;
            --green-on: #2acc2a;
            --green-off: #0a4d0a;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-color);
            color: #fff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        h1 { 
            text-align: center;
            margin: 15px 0 5px 0; 
            font-weight: 600; 
            font-size: 1.8rem;
            letter-spacing: 2px; 
            text-transform: uppercase;
            color: #888;
        }

        /* Full screen console rack framework */
        .console-rack {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(7, 1fr); /* Spreads all 7 stations perfectly across the screen width */
            gap: 12px;
            padding: 15px;
            background-color: #222;
            border-top: 6px ridge #3a3a3a;
            box-sizing: border-box;
        }

        /* Individual heavy vertical channel strip */
        .channel-strip {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            background: var(--box-bg);
            padding: 20px 10px;
            border: 2px solid #2d2d2d;
            border-radius: 6px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            box-sizing: border-box;
        }

        /* Maximized industrial cue buttons */
        .cue-btn {
            width: 90%;
            /* Using aspect-ratio keeps the pushbuttons perfectly square as they scale */
            aspect-ratio: 1 / 1; 
            max-width: 160px;
            border: 5px solid #111;
            border-radius: 50%;
            cursor: pointer;
            outline: none;
            box-sizing: border-box;
            transition: all 0.05s ease;
        }

        .btn-standby {
            background: radial-gradient(circle, #5a1010 0%, var(--red-off) 100%);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.9), 0 4px 6px rgba(0,0,0,0.5);
        }

        .btn-standby.active {
            background: radial-gradient(circle, #ff8888 0%, var(--red-on) 100%);
            box-shadow: 0 0 35px var(--red-on), inset 0 0 10px #fff;
            border-color: #fff;
            transform: scale(0.98);
        }

        .btn-go {
            background: radial-gradient(circle, #105a10 0%, var(--green-off) 100%);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.9), 0 4px 6px rgba(0,0,0,0.5);
        }

        .btn-go.active {
            background: radial-gradient(circle, #88ff88 0%, var(--green-on) 100%);
            box-shadow: 0 0 35px var(--green-on), inset 0 0 10px #fff;
            border-color: #fff;
            transform: scale(0.98);
        }

        /* Huge bold identifier windows */
        .label-window {
            width: 95%;
            background-color: #f8f9fa;
            color: #000;
            font-weight: 900;
            font-size: calc(1.5vw + 1rem); /* Auto-scales text size based on display dimensions */
            padding: 12px 0;
            text-align: center;
            text-transform: uppercase;
            border: 4px solid #000;
            border-radius: 4px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            letter-spacing: 1px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <h1>Stage Manager Master Console</h1>
    <div class="console-rack" id="master-rack"></div>

    <script>
        const SUPABASE_URL = "https://lehixazrwwjldgpxylig.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxlaGl4YXpyd3dqbGRncHh5bGlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyODc4NDAsImV4cCI6MjA5Njg2Mzg0MH0.y66qZeA-z3lULQHGTCI7_aY3BEA9Qj6i56xhyX0uH8I"; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const stationList = ["LX", "SQ", "SL", "SR", "RAIL", "AUTO", "MD"];

        async function syncDataFromDatabase() {
            let { data: currentCues } = await supabaseClient.from('cues').select('*');
            if (currentCues) {
                currentCues.forEach(row => {
                    updateButtonUI(row.station, String(row.state).toUpperCase());
                });
            }
        }

        async function buildConsole() {
            const rack = document.getElementById('master-rack');
            rack.innerHTML = '';

            stationList.forEach(st => {
                const strip = document.createElement('div');
                strip.className = 'channel-strip';
                strip.innerHTML = `
                    <button class="cue-btn btn-standby" id="std-${st}" onclick="toggleSignal('${st}', 'STANDBY')"></button>
                    <div class="label-window">${st}</div>
                    <button class="cue-btn btn-go" id="go-${st}" onclick="toggleSignal('${st}', 'GO')"></button>
                `;
                rack.appendChild(strip);
            });

            await syncDataFromDatabase();

            supabaseClient.channel('sm-sync')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'cues' }, 
                payload => { 
                    if(payload.new) {
                        updateButtonUI(payload.new.station, String(payload.new.state).toUpperCase()); 
                    }
                }
            ).subscribe();

            setInterval(syncDataFromDatabase, 500);
        }

        async function toggleSignal(station, targetState) {
            const standbyBtn = document.getElementById(`std-${station}`);
            const goBtn = document.getElementById(`go-${station}`);
            let isCurrentlyActive = (targetState === 'STANDBY' && standbyBtn.classList.contains('active')) || 
                                    (targetState === 'GO' && goBtn.classList.contains('active'));
            
            const newState = isCurrentlyActive ? 'OFF' : targetState;
            updateButtonUI(station, newState);
            
            await supabaseClient.from('cues').update({ state: newState }).eq('station', station);
        }

        function updateButtonUI(station, state) {
            const stdBtn = document.getElementById(`std-${station}`);
            const goBtn = document.getElementById(`go-${station}`);
            if (!stdBtn || !goBtn) return;

            stdBtn.classList.remove('active');
            goBtn.classList.remove('active');

            if (state === 'STANDBY') stdBtn.classList.add('active');
            if (state === 'GO') goBtn.classList.add('active');
        }

        window.onload = buildConsole;
    </script>
</body>
</html>
